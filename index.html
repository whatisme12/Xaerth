<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

body{
background:#0b0b12;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
font-family:'Press Start 2P', cursive;
}

/* arcade */

.arcade{
width:320px;
height:500px;
background:#1b1b2b;
border-radius:20px 20px 10px 10px;
box-shadow:0 0 40px #000;
position:relative;
display:flex;
flex-direction:column;
align-items:center;
padding-top:40px;
}

/* pantalla */

.screen{
width:260px;
height:180px;
background:#050509;
border:8px solid #333;
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:#ff3b3b;
font-size:14px;
line-height:1.6;
box-shadow:0 0 20px #000 inset;
}

/* controles */

.controls{
position:absolute;
bottom:40px;
display:flex;
gap:20px;
}

.button{
width:30px;
height:30px;
background:#ff3b3b;
border-radius:50%;
box-shadow:0 0 10px #000;
}

.joystick{
width:40px;
height:40px;
background:#222;
border-radius:50%;
position:relative;
}

.joystick::after{
content:"";
position:absolute;
width:12px;
height:35px;
background:#ff3b3b;
top:-25px;
left:14px;
border-radius:6px;
}

</style>
</head>

<body>

<div class="arcade">

<div class="screen">
Fuera de servicio :(
</div>

<div class="controls">
<div class="joystick"></div>
<div class="button"></div>
<div class="button"></div>
</div>

</div>

</body>
</html>
